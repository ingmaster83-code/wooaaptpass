name: Update Data & Pages

on:
  schedule:
    - cron: '0 17 * * *'   # 매일 02:00 KST (= UTC 17:00)
  workflow_dispatch:         # 수동 실행 허용

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests jinja2 python-dotenv

      - name: Fetch data
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python scripts/fetch_data.py

      - name: Generate pages
        env:
          KAKAO_MAP_KEY: ${{ secrets.KAKAO_MAP_KEY }}
        run: python scripts/generate_pages.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --quiet && git diff --staged --quiet \
            || git commit -m "chore: auto-update $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
